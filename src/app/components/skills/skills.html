<div
  class="flex flex-col justify-center items-center bg-primary gap-6 px-4 py-16 md:px-8 md:py-20 md:gap-12 2xl:px-[112px] 2xl:py-24"
>
  <app-heading body="Here's what I'm really good at:">
    <app-tag title="Skills" />
  </app-heading>
  <div class="grid gap-4 grid-cols-3 w-full md:grid-cols-4 2xl:grid-cols-8">
    <div class="flex flex-col gap-2 items-center" *ngFor="let skill of skills">
      <img src="{{ skill.image }}" alt="{{ skill.name }}" />
      <p class="text-base leading-6 text-body md:leading-7 md:text-lg">
        {{ skill.name }}
      </p>
    </div>
  </div>
</div>
